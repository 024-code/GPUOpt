{{- if .Values.grafana.enabled }}
{{- if .Values.grafana.dashboards.enabled }}
{{- $dashboards := .Files.Glob "dashboards/*.json" }}
{{- if $dashboards }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gpuopt.fullname" . }}-grafana-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpuopt.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  {{- range $path, $content := $dashboards }}
  {{ base $path }}: |
    {{- $content | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
