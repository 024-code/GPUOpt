{{- if eq .Values.database.type "postgres" }}
{{- if not .Values.database.postgres.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gpuopt.fullname" . }}-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpuopt.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ include "gpuopt.databaseUrl" . | quote }}
{{- end }}
{{- end }}
