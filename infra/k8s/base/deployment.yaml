apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpuopt-backend
  namespace: gpuopt-system
  labels:
    app.kubernetes.io/name: gpuopt-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gpuopt-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpuopt-backend
    spec:
      serviceAccountName: gpuopt-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: backend
          image: gpuopt-backend-sandbox:local
          imagePullPolicy: IfNotPresent
          args: ["uvicorn", "gpuopt.main:app", "--host", "0.0.0.0", "--port", "8080"]
          envFrom:
            - configMapRef:
                name: gpuopt-config
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
