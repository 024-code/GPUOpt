apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gpuoptimizationprofiles.gpuopt.ai
  labels:
    app.kubernetes.io/part-of: gpuopt
spec:
  group: gpuopt.ai
  names:
    kind: GPUOptimizationProfile
    plural: gpuoptimizationprofiles
    singular: gpuoptimizationprofile
    shortNames:
      - gpuprof
      - gpp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - optimizationRules
              properties:
                targetRef:
                  type: object
                  properties:
                    kind:
                      type: string
                      enum: [Namespace, Team]
                      default: Namespace
                    name:
                      type: string
                optimizationRules:
                  type: array
                  items:
                    type: object
                    required:
                      - ruleType
                    properties:
                      ruleType:
                        type: string
                        enum:
                          - gpu_quota
                          - utilization_target
                          - power_cap
                          - scheduling_preference
                          - cost_budget
                      enabled:
                        type: boolean
                        default: true
                      maxGpus:
                        type: integer
                        minimum: 0
                      minUtilizationPercent:
                        type: number
                        minimum: 0
                        maximum: 100
                      maxPowerWatts:
                        type: integer
                        minimum: 0
                      preferredGpuModel:
                        type: string
                      budgetMonthlyUsd:
                        type: number
                        minimum: 0
                      scheduling:
                        type: object
                        properties:
                          allowPreemption:
                            type: boolean
                          preferredNodeSelector:
                            type: object
                            additionalProperties:
                              type: string
                          taints:
                            type: array
                            items:
                              type: object
                              properties:
                                key:
                                  type: string
                                value:
                                  type: string
                                effect:
                                  type: string
                                  enum: [NoSchedule, PreferNoSchedule, NoExecute]
              status:
                type: object
                properties:
                  observedGeneration:
                    type: integer
                  conditions:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        status:
                          type: string
                          enum: [True, False, Unknown]
                        reason:
                          type: string
                        message:
                          type: string
                        lastTransitionTime:
                          type: string
                          format: date-time
