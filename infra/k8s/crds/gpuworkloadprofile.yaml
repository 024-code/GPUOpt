apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gpuworkloadprofiles.gpuopt.ai
  labels:
    app.kubernetes.io/part-of: gpuopt
spec:
  group: gpuopt.ai
  names:
    kind: GPUWorkloadProfile
    plural: gpuworkloadprofiles
    singular: gpuworkloadprofile
    shortNames:
      - gpuwl
      - gwl
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - workloadSelector
              properties:
                workloadSelector:
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                    matchNames:
                      type: array
                      items:
                        type: string
                requirements:
                  type: object
                  properties:
                    minGpuMemoryGb:
                      type: integer
                      minimum: 0
                    preferredGpuModel:
                      type: string
                    gpuCount:
                      type: integer
                      minimum: 1
                    nodeCount:
                      type: integer
                      minimum: 1
                    gpuMemoryFraction:
                      type: number
                      minimum: 0
                      maximum: 1
                optimization:
                  type: object
                  properties:
                    enableElasticTraining:
                      type: boolean
                    enablePreemption:
                      type: boolean
                    preferredBatchSize:
                      type: integer
                    tensorParallelism:
                      type: integer
                    pipelineParallelism:
                      type: integer
                    dataParallelism:
                      type: integer
                    targetLatencyMs:
                      type: integer
                    targetThroughputTokensPerSec:
                      type: integer
                    powerCapWatts:
                      type: integer
              status:
                type: object
                properties:
                  observedGeneration:
                    type: integer
                  conditions:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        status:
                          type: string
                          enum: [True, False, Unknown]
                        reason:
                          type: string
                        message:
                          type: string
                        lastTransitionTime:
                          type: string
                          format: date-time
