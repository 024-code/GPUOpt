[alembic]
script_location = migrations/alembic
prepend_sys_path = src
path_separator = os
# Overridden at runtime by migrations/alembic/env.py via Settings.resolved_database_url
# Set GPUOPT_DATABASE_URL env var or GPUOPT_DATABASE_PATH to control the target
sqlalchemy.url = sqlite:///./data/gpuopt.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
